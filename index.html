<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirella David - Acesso VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #0f0f0f 0%, #1a0505 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #ff0050;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 80, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 80, 0); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .status {
            color: #ff0050;
            font-size: 1rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,0,80,0.2);
            border-top: 4px solid #ff0050;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .msg {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .btn-manual {
            display: inline-block;
            margin-top: 25px;
            background: linear-gradient(45deg, #ff0050, #ff5000);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://i.ibb.co/jvc5z4hr/BY-Admiregirls-com-Admiregirls-com-36.jpg" alt="Mirella David" class="profile-img">
        <h1>Mirella David</h1>
        <div class="status">🔴 Acesso Exclusivo +18</div>
        <div class="loader"></div>
        <div class="msg">Abrindo seu acesso exclusivo...</div>
        <a href="https://t.me/Mirella_david_bot" class="btn-manual" id="btnManual">
            👆 Clique aqui se não abriu
        </a>
    </div>

    <script>
        var BOT_LINK = "https://t.me/Mirella_david_bot";
        var BOT_DEEP = "tg://resolve?domain=Mirella_david_bot";

        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        if (isMobile) {
            // Tenta abrir o app do Telegram direto
            window.location.href = BOT_DEEP;

            // Após 2 segundos mostra o botão manual e tenta o link web
            setTimeout(function() {
                document.getElementById('btnManual').style.display = 'inline-block';
                window.location.href = BOT_LINK;
            }, 2000);
        } else {
            // No PC redireciona direto para o link web
            setTimeout(function() {
                window.location.href = BOT_LINK;
            }, 1000);
        }
    </script>

</body>
</html>
