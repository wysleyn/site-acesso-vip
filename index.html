<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirella David - VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0f0f0f 0%, #1a0505 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff0050;
            margin-bottom: 20px;
            object-fit: cover;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: #fff; }
        p { color: #aaa; font-size: 1rem; line-height: 1.5; margin-bottom: 30px; }
        
        .btn-link {
            background: linear-gradient(45deg, #ff0050, #ff5000);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 80, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 0, 80, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 80, 0); }
        }

        .footer { margin-top: 30px; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Mirella David" class="profile-img">
        
        <h1>Mirella David</h1>
        <p>Acesse agora o conteúdo exclusivo que foi banido de outras redes sociais.</p>

        <a href="https://t.me/Mirella_david_bot" class="btn-link">QUERO ACESSO AGORA</a>

        <div class="footer">
            CONTEÚDO PARA MAIORES DE 18 ANOS<br>
            © 2026 Mirella David - Todos os direitos reservados.
        </div>
    </div>

</body>
</html>
